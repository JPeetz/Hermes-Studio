name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silence deprecation warning

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm exec vitest run --reporter=json --outputFile=test-results.json

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PASSED=$(node -e "
            const r = require('./test-results.json');
            console.log(r.numPassedTests ?? 0);
          ")
          echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"${PASSED} passed\",\"color\":\"brightgreen\"}" > badges/tests.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/tests.json
          git diff --staged --quiet || git commit -m "ci: update test badge [skip ci]"
          git push

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=2048'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
